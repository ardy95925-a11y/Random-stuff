<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FRAME CATCHER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  overflow:hidden;
  width:100vw;
  height:100vh;
  touch-action:none;
  font-family:'Orbitron','Courier New',monospace;
  -webkit-user-select:none;
  user-select:none;
}

canvas { display:block; position:fixed; top:0; left:0; }

/* ── HUD ── */
#hud {
  position:fixed; top:0; left:0; right:0;
  padding:22px 28px 0;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  z-index:10;
  pointer-events:none;
}

.hud-panel {
  background:rgba(0,10,20,0.7);
  border:1px solid rgba(0,220,255,0.2);
  border-radius:10px;
  padding:8px 16px;
  backdrop-filter:blur(6px);
}

.hud-label {
  font-size:0.52rem;
  letter-spacing:0.35em;
  color:rgba(0,220,255,0.45);
  text-transform:uppercase;
  margin-bottom:2px;
}

.hud-val {
  font-size:1.7rem;
  font-weight:900;
  color:#00dcff;
  text-shadow:0 0 18px rgba(0,220,255,0.7);
  line-height:1;
}

#combo-display {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:1.6rem;
  font-weight:900;
  color:#ffd700;
  text-shadow:0 0 25px rgba(255,215,0,0.9);
  letter-spacing:0.15em;
  pointer-events:none;
  z-index:12;
  opacity:0;
  transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1), opacity 0.15s;
}
#combo-display.show {
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
}

.lives-row {
  display:flex;
  gap:7px;
  margin-top:6px;
}

.life-sq {
  width:16px;
  height:16px;
  border:2px solid #ff3366;
  box-shadow:0 0 8px rgba(255,51,102,0.7), inset 0 0 4px rgba(255,51,102,0.3);
  background:rgba(255,51,102,0.15);
  border-radius:3px;
  transition:all 0.4s;
}
.life-sq.dead {
  border-color:rgba(255,51,102,0.15);
  background:transparent;
  box-shadow:none;
}

/* ── OVERLAY SCREENS ── */
.screen {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:30;
  transition:opacity 0.5s;
}
.screen.hidden { opacity:0; pointer-events:none; }

.screen-bg {
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 50% 40%, rgba(0,15,35,0.92), rgba(0,0,5,0.97));
}

.screen-content { position:relative; z-index:1; text-align:center; padding:30px; }

.game-title {
  font-size:clamp(2.8rem,10vw,4.5rem);
  font-weight:900;
  letter-spacing:0.08em;
  line-height:0.9;
  margin-bottom:10px;
}
.game-title .t1 {
  display:block;
  background:linear-gradient(135deg,#00dcff,#0088cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 30px rgba(0,200,255,0.5));
}
.game-title .t2 {
  display:block;
  background:linear-gradient(135deg,#ff3cac,#cc0077);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255,60,172,0.5));
}

.subtitle {
  font-size:0.65rem;
  letter-spacing:0.45em;
  color:rgba(150,200,255,0.4);
  text-transform:uppercase;
  margin-bottom:50px;
}

.tap-prompt {
  font-size:0.95rem;
  font-weight:700;
  letter-spacing:0.25em;
  color:#00dcff;
  text-shadow:0 0 20px rgba(0,220,255,0.8);
  text-transform:uppercase;
  animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

.inst-box {
  margin-top:44px;
  border:1px solid rgba(0,150,200,0.2);
  border-radius:12px;
  padding:20px 28px;
  background:rgba(0,20,40,0.5);
}
.inst-line {
  font-size:0.62rem;
  letter-spacing:0.12em;
  color:rgba(160,210,255,0.45);
  text-transform:uppercase;
  line-height:2;
}

.final-score-big {
  font-size:clamp(3rem,14vw,5.5rem);
  font-weight:900;
  color:#ffd700;
  text-shadow:0 0 40px rgba(255,215,0,0.8);
  line-height:1;
  margin:16px 0 10px;
}

.hs-tag {
  font-size:0.7rem;
  letter-spacing:0.22em;
  color:#39ff14;
  text-shadow:0 0 14px rgba(57,255,20,0.8);
  text-transform:uppercase;
  min-height:1.3em;
}

/* ── SCORE POPUP ── */
.score-pop {
  position:fixed;
  font-family:'Orbitron',monospace;
  font-weight:900;
  pointer-events:none;
  z-index:20;
  animation:pop-fly 1.1s ease-out forwards;
  white-space:nowrap;
}
@keyframes pop-fly {
  0%   { transform:translateY(0) scale(1);   opacity:1; }
  100% { transform:translateY(-90px) scale(1.5); opacity:0; }
}

/* ── FLASH ── */
#flash {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:11;
  opacity:0;
  transition:opacity 0.08s;
}
</style>
</head>
<body>

<div id="flash"></div>

<div id="hud">
  <div class="hud-panel">
    <div class="hud-label">Score</div>
    <div class="hud-val" id="h-score">0</div>
    <div class="lives-row">
      <div class="life-sq" id="l0"></div>
      <div class="life-sq" id="l1"></div>
      <div class="life-sq" id="l2"></div>
    </div>
  </div>
  <div class="hud-panel" style="text-align:right">
    <div class="hud-label">Level</div>
    <div class="hud-val" id="h-level" style="color:#ff3cac;text-shadow:0 0 18px rgba(255,60,172,0.7)">1</div>
  </div>
</div>

<div id="combo-display">×<span id="combo-num">0</span> COMBO!</div>

<!-- Title -->
<div class="screen" id="scr-title">
  <div class="screen-bg"></div>
  <div class="screen-content">
    <div class="game-title">
      <span class="t1">FRAME</span>
      <span class="t2">CATCHER</span>
    </div>
    <div class="subtitle">3D Physics Challenge</div>
    <div class="tap-prompt">Tap to Play</div>
    <div class="inst-box">
      <div class="inst-line">Drag the frame left & right</div>
      <div class="inst-line">Catch cubes as they fall through</div>
      <div class="inst-line">Miss 3 cubes — Game Over</div>
    </div>
  </div>
</div>

<!-- Game Over -->
<div class="screen hidden" id="scr-over">
  <div class="screen-bg"></div>
  <div class="screen-content">
    <div class="game-title">
      <span class="t1">GAME</span>
      <span class="t2">OVER</span>
    </div>
    <div class="subtitle">Final Score</div>
    <div class="final-score-big" id="final-score">0</div>
    <div class="hs-tag" id="hs-tag"></div>
    <div class="tap-prompt" style="margin-top:44px">Tap to Retry</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  FRAME CATCHER — Complete Game
// ═══════════════════════════════════════════════════════════

const W = window.innerWidth, H = window.innerHeight;

// ── Renderer ────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));
renderer.setClearColor(0x010812, 1);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

// ── Scene ───────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x010812, 0.022);

// ── Camera ──────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(58, W / H, 0.1, 120);
camera.position.set(0, 7, 20);
camera.lookAt(0, -1, 0);

const camBase = { x: 0, y: 7 };
let camShakeAmt = 0;

// ── Lighting ────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a1830, 4));

const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(6, 12, 8);
scene.add(sun);

const fillLight = new THREE.PointLight(0x0055aa, 3, 30);
fillLight.position.set(-8, 4, 8);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0xff3cac, 1.5, 25);
rimLight.position.set(8, -2, -8);
scene.add(rimLight);

// Frame glow light
const framePL = new THREE.PointLight(0x00dcff, 4, 10);
framePL.position.set(0, -4, 2);
scene.add(framePL);

// ── Stars ───────────────────────────────────────────────────
(function buildStars() {
  const pos = new Float32Array(900 * 3);
  for (let i = 0; i < 900; i++) {
    pos[i*3]   = (Math.random()-0.5)*100;
    pos[i*3+1] = (Math.random()-0.5)*100;
    pos[i*3+2] = Math.random()*-80 - 5;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color:0x88bbff, size:0.07, transparent:true, opacity:0.75 });
  scene.add(new THREE.Points(geo, mat));
})();

// ── Grid floor ──────────────────────────────────────────────
(function buildGrid() {
  const g = new THREE.GridHelper(60, 24, 0x001122, 0x001122);
  g.position.y = -12;
  g.material.transparent = true;
  g.material.opacity = 0.5;
  scene.add(g);
})();

// ── Horizon glow ────────────────────────────────────────────
(function buildHorizon() {
  const geo = new THREE.PlaneGeometry(60, 8);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x001830,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide,
  });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI / 2;
  m.position.y = -12;
  scene.add(m);
})();

// ── Ambient floating particles ───────────────────────────────
const ambientParticles = [];
(function buildAmbient() {
  for (let i = 0; i < 30; i++) {
    const geo = new THREE.SphereGeometry(0.04, 4, 4);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(Math.random(), 1, 0.6),
      transparent: true,
      opacity: 0.35,
    });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(
      (Math.random()-0.5)*18,
      Math.random()*20 - 8,
      (Math.random()-0.5)*5
    );
    m.userData.vy = (Math.random()-0.5)*0.01;
    m.userData.phase = Math.random()*Math.PI*2;
    scene.add(m);
    ambientParticles.push(m);
  }
})();

// ═══════════════════════════════════════════════════════════
//  FRAME
// ═══════════════════════════════════════════════════════════
const FRAME_HS    = 3.0;   // half-size (opening = 6 units wide)
const BAR_T       = 0.24;  // bar thickness
const BAR_D       = 0.55;  // bar depth (3D)
const FRAME_Y     = -4.0;  // world Y of frame centre
const FRAME_MAX_X = 6.5;   // max horizontal range

let frameGroup;
let frameTargetX = 0;
const frameBars = [];   // bar meshes for flash effect

function buildFrame() {
  frameGroup = new THREE.Group();

  const neonMat = () => new THREE.MeshStandardMaterial({
    color:            0x00dcff,
    emissive:         0x009ab5,
    emissiveIntensity: 1.4,
    metalness: 0.6,
    roughness: 0.1,
  });

  const FS = FRAME_HS, T = BAR_T, D = BAR_D;
  const full = FS * 2 + T * 2;

  const barDefs = [
    { size:[full,  T,  D], pos:[0,    FS,  0] },
    { size:[full,  T,  D], pos:[0,   -FS,  0] },
    { size:[T,  FS*2,  D], pos:[-FS,  0,   0] },
    { size:[T,  FS*2,  D], pos:[ FS,  0,   0] },
  ];

  barDefs.forEach(({size, pos}) => {
    const mat = neonMat();
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(...size), mat);
    mesh.position.set(...pos);

    // Inner glow shell
    const gMat = new THREE.MeshBasicMaterial({
      color: 0x00dcff, transparent: true, opacity: 0.1, side: THREE.BackSide
    });
    const gShell = new THREE.Mesh(
      new THREE.BoxGeometry(size[0]+0.15, size[1]+0.15, size[2]+0.1),
      gMat
    );
    mesh.add(gShell);

    frameGroup.add(mesh);
    frameBars.push({ mesh, mat, gMat });
  });

  // Corner ornaments
  const cornerMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0x00ddff,
    emissiveIntensity: 2.5,
    metalness: 0.4,
    roughness: 0.0,
  });
  [[-FS,FS],[FS,FS],[-FS,-FS],[FS,-FS]].forEach(([cx,cy]) => {
    const c = new THREE.Mesh(
      new THREE.BoxGeometry(T*2.2, T*2.2, D*1.8),
      cornerMat
    );
    c.position.set(cx, cy, 0);
    frameGroup.add(c);
  });

  // Inner ring effect (thin additive plane)
  const ringGeo = new THREE.RingGeometry(FS - 0.3, FS + 0.1, 4);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x00dcff,
    transparent: true,
    opacity: 0.04,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.z = Math.PI/4;
  frameGroup.add(ring);

  frameGroup.position.y = FRAME_Y;
  frameGroup.rotation.x = -0.18;  // tilt to show 3D
  scene.add(frameGroup);
}

buildFrame();

function setFrameGlow(color, intensity) {
  frameBars.forEach(({mat, gMat}) => {
    mat.emissive.setHex(color);
    mat.emissiveIntensity = intensity;
    gMat.opacity = intensity * 0.07;
  });
}

function flashFrame(hexColor) {
  frameBars.forEach(({mat}) => {
    mat.color.setHex(hexColor);
    mat.emissive.setHex(hexColor);
    mat.emissiveIntensity = 4;
  });
  framePL.color.setHex(hexColor);
  framePL.intensity = 10;
  setTimeout(() => {
    frameBars.forEach(({mat}) => {
      mat.color.setHex(0x00dcff);
      mat.emissive.setHex(0x009ab5);
      mat.emissiveIntensity = 1.4;
    });
    framePL.color.setHex(0x00dcff);
  }, 170);
}

// ═══════════════════════════════════════════════════════════
//  FALLING CUBES
// ═══════════════════════════════════════════════════════════
const CUBE_SZ   = 1.5;
const SPAWN_Y   = 14;
const DESPAWN_Y = -14;

const PALETTE = [
  { c: 0xff2255, e: 0xcc0033 },
  { c: 0xff8800, e: 0xaa5500 },
  { c: 0x00ff88, e: 0x00aa44 },
  { c: 0xaa00ff, e: 0x6600bb },
  { c: 0xffee00, e: 0xaaaa00 },
  { c: 0x00aaff, e: 0x0066cc },
  { c: 0xff44cc, e: 0xcc0088 },
  { c: 0x44ffdd, e: 0x00aa88 },
];

class FallingCube {
  constructor(speed) {
    const pal = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    const geo = new THREE.BoxGeometry(CUBE_SZ, CUBE_SZ, CUBE_SZ);
    const mat = new THREE.MeshStandardMaterial({
      color: pal.c,
      emissive: pal.e,
      emissiveIntensity: 0.9,
      metalness: 0.55,
      roughness: 0.18,
    });
    this.mesh = new THREE.Mesh(geo, mat);

    // Edges
    const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
    this.mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat));

    // Outer glow shell
    const gMat = new THREE.MeshBasicMaterial({ color: pal.c, transparent: true, opacity: 0.08, side: THREE.BackSide });
    this.mesh.add(new THREE.Mesh(new THREE.BoxGeometry(CUBE_SZ+0.3,CUBE_SZ+0.3,CUBE_SZ+0.3), gMat));

    this.mesh.position.x = (Math.random()-0.5) * (FRAME_MAX_X * 1.9);
    this.mesh.position.y = SPAWN_Y;
    this.mesh.position.z = (Math.random()-0.5) * 1.5;

    this.speed  = speed;
    this.rotV   = new THREE.Vector3(
      (Math.random()-0.5)*0.07,
      (Math.random()-0.5)*0.07,
      (Math.random()-0.5)*0.05,
    );
    this.color  = pal.c;
    this.prevY  = SPAWN_Y;
    this.checked= false;
    this.alive  = true;
    scene.add(this.mesh);
  }

  update() {
    this.prevY = this.mesh.position.y;
    this.mesh.position.y -= this.speed;
    this.mesh.rotation.x += this.rotV.x;
    this.mesh.rotation.y += this.rotV.y;
    this.mesh.rotation.z += this.rotV.z;
  }

  crossedFrame() {
    return !this.checked && this.prevY > FRAME_Y && this.mesh.position.y <= FRAME_Y;
  }

  inFrame() {
    const dx = Math.abs(this.mesh.position.x - frameGroup.position.x);
    return dx < FRAME_HS - CUBE_SZ * 0.45;
  }

  destroy() {
    this.alive = false;
    scene.remove(this.mesh);
    this.mesh.traverse(c => {
      if (c.geometry) c.geometry.dispose();
      if (c.material) c.material.dispose();
    });
  }
}

// ═══════════════════════════════════════════════════════════
//  EFFECTS
// ═══════════════════════════════════════════════════════════
class ShatterFX {
  constructor(pos, color) {
    this.pieces = [];
    for (let i = 0; i < 18; i++) {
      const s = 0.12 + Math.random()*0.32;
      const mat = new THREE.MeshStandardMaterial({
        color, emissive: color, emissiveIntensity: 2,
        transparent: true, opacity: 1,
        metalness: 0.4, roughness: 0.2,
      });
      const m = new THREE.Mesh(new THREE.BoxGeometry(s,s,s), mat);
      m.position.copy(pos);
      const ang = Math.random()*Math.PI*2;
      const spd = 0.12 + Math.random()*0.28;
      m.userData = {
        vx: Math.cos(ang)*spd,
        vy: 0.06 + Math.random()*0.18,
        vz: Math.sin(ang)*spd*0.6,
        rx: (Math.random()-0.5)*0.25,
        ry: (Math.random()-0.5)*0.25,
        mat, life: 1,
      };
      scene.add(m);
      this.pieces.push(m);
    }
    this.done = false;
  }
  update() {
    let alive = 0;
    this.pieces.forEach(p => {
      const d = p.userData;
      if (d.life <= 0) return;
      p.position.x += d.vx;
      p.position.y += d.vy;
      p.position.z += d.vz;
      d.vy -= 0.015;
      p.rotation.x += d.rx;
      p.rotation.y += d.ry;
      d.life -= 0.028;
      d.mat.opacity = Math.max(0, d.life);
      d.mat.emissiveIntensity = Math.max(0, d.life * 2.5);
      if (d.life > 0) alive++;
    });
    if (alive === 0) {
      this.pieces.forEach(p => {
        scene.remove(p);
        p.userData.mat.dispose();
        p.geometry.dispose();
      });
      this.done = true;
    }
  }
}

class RippleFX {
  constructor(pos) {
    this.rings = [];
    for (let i = 0; i < 3; i++) {
      const mat = new THREE.MeshBasicMaterial({
        color: 0xff2244, transparent: true, opacity: 0.7 - i*0.15,
        side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.1, 0.4, 24),
        mat
      );
      ring.position.set(pos.x, FRAME_Y, pos.z);
      ring.rotation.x = -Math.PI/2 + frameGroup.rotation.x;
      ring.userData = { mat, delay: i * 4, life: 1, started: false };
      scene.add(ring);
      this.rings.push(ring);
    }
    this.done = false;
    this.t = 0;
  }
  update() {
    this.t++;
    let allDone = true;
    this.rings.forEach(r => {
      const d = r.userData;
      if (this.t < d.delay) { allDone = false; return; }
      if (!d.started) { d.started = true; }
      const sc = 1 + (this.t - d.delay) * 0.22;
      r.scale.setScalar(sc);
      d.life -= 0.04;
      d.mat.opacity = Math.max(0, d.life * 0.5);
      if (d.life > 0) allDone = false;
    });
    if (allDone) {
      this.rings.forEach(r => {
        scene.remove(r);
        r.userData.mat.dispose();
        r.geometry.dispose();
      });
      this.done = true;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
const ST = { TITLE:0, PLAY:1, OVER:2 };
let gs = ST.TITLE;

let score=0, lives=3, level=1, combo=0, caughtCount=0;
let cubes=[], shatters=[], ripples=[];
let spawnTimer=0, spawnInterval=110, cubeSpeed=0.065;
let tick=0;
let highScore = +(localStorage.getItem('fc_hs')||0);
let comboTimer = 0;

// ── HUD update ──────────────────────────────────────────────
function hud() {
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-level').textContent = level;
  for (let i=0;i<3;i++)
    document.getElementById('l'+i).classList.toggle('dead', i >= lives);
}

// ── Flash screen ────────────────────────────────────────────
const flashEl = document.getElementById('flash');
function flashScreen(col) {
  flashEl.style.background = col;
  flashEl.style.opacity = '1';
  setTimeout(() => flashEl.style.opacity='0', 140);
}

// ── Score popup ─────────────────────────────────────────────
function scorePopup(pts, worldPos, isCombo) {
  const v = worldPos.clone().project(camera);
  const x = (v.x*0.5+0.5)*W;
  const y = (-v.y*0.5+0.5)*H;
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = `+${pts}`;
  el.style.left   = `${x-28}px`;
  el.style.top    = `${y}px`;
  el.style.fontSize = isCombo ? '1.8rem' : '1.2rem';
  el.style.color  = isCombo ? '#ffd700' : '#00dcff';
  el.style.textShadow = isCombo
    ? '0 0 18px rgba(255,215,0,0.9)'
    : '0 0 14px rgba(0,220,255,0.8)';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// ── Combo display ────────────────────────────────────────────
const comboEl  = document.getElementById('combo-display');
const comboNum = document.getElementById('combo-num');
function showCombo(n) {
  comboNum.textContent = n;
  comboEl.classList.add('show');
  clearTimeout(comboEl._t);
  comboEl._t = setTimeout(() => comboEl.classList.remove('show'), 1000);
}

// ── Spawn ────────────────────────────────────────────────────
function spawnCube() {
  cubes.push(new FallingCube(cubeSpeed));
}

// ── Catch ────────────────────────────────────────────────────
function onCatch(cube) {
  combo++;
  caughtCount++;
  const mult = combo >= 3 ? Math.min(combo, 10) : 1;
  const pts  = 100 * level * mult;
  score += pts;

  shatters.push(new ShatterFX(cube.mesh.position.clone(), cube.color));

  const isCombo = combo >= 3;
  scorePopup(pts, cube.mesh.position.clone(), isCombo);
  if (isCombo) showCombo(combo);

  flashFrame(isCombo ? 0xffd700 : 0x00ff88);
  flashScreen(isCombo ? 'rgba(255,200,0,0.07)' : 'rgba(0,255,120,0.07)');

  // Level up every 8 catches
  if (caughtCount > 0 && caughtCount % 8 === 0) levelUp();

  cube.destroy();
  hud();
}

// ── Miss ─────────────────────────────────────────────────────
function onMiss(cube) {
  combo = 0;
  lives--;
  ripples.push(new RippleFX(cube.mesh.position.clone()));
  flashScreen('rgba(255,20,50,0.12)');
  camShakeAmt = 0.35;
  cube.destroy();
  hud();
  if (lives <= 0) setTimeout(endGame, 350);
}

// ── Level up ─────────────────────────────────────────────────
function levelUp() {
  level++;
  cubeSpeed    = Math.min(0.065 + (level-1)*0.016, 0.22);
  spawnInterval = Math.max(52, 110 - (level-1)*9);

  // Banner
  const el = document.createElement('div');
  el.textContent = `LEVEL ${level}`;
  el.style.cssText=`position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Orbitron',monospace;font-size:2.8rem;font-weight:900;
    color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,0.9);
    pointer-events:none;z-index:25;animation:pop-fly 1.6s ease-out forwards`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
  hud();
}

// ── Start / End ──────────────────────────────────────────────
function startGame() {
  score=0; lives=3; level=1; combo=0; caughtCount=0;
  cubeSpeed=0.065; spawnInterval=110; spawnTimer=60;
  frameTargetX=0; frameGroup.position.x=0;
  cubes.forEach(c=>c.destroy()); cubes=[];
  shatters=[]; ripples=[];
  gs=ST.PLAY;
  hud();
  document.getElementById('scr-title').classList.add('hidden');
  document.getElementById('scr-over').classList.add('hidden');
}

function endGame() {
  gs=ST.OVER;
  if (score>highScore) {
    highScore=score;
    localStorage.setItem('fc_hs',highScore);
    document.getElementById('hs-tag').textContent='★ NEW HIGH SCORE ★';
  } else {
    document.getElementById('hs-tag').textContent=`Best: ${highScore}`;
  }
  document.getElementById('final-score').textContent=score;
  document.getElementById('scr-over').classList.remove('hidden');
}

// ═══════════════════════════════════════════════════════════
//  INPUT — Touch & Mouse
// ═══════════════════════════════════════════════════════════
let dragging=false, lastDragX=0;

function tapStart(clientX) {
  if (gs===ST.TITLE) { startGame(); return; }
  if (gs===ST.OVER)  { startGame(); return; }
  dragging=true;
  lastDragX=clientX;
}
function tapMove(clientX) {
  if (!dragging || gs!==ST.PLAY) return;
  const dx = clientX - lastDragX;
  lastDragX = clientX;
  frameTargetX = Math.max(-FRAME_MAX_X, Math.min(FRAME_MAX_X, frameTargetX + dx*0.019));
}
function tapEnd() { dragging=false; }

document.addEventListener('touchstart', e=>{e.preventDefault(); tapStart(e.touches[0].clientX);},{passive:false});
document.addEventListener('touchmove',  e=>{e.preventDefault(); tapMove(e.touches[0].clientX); },{passive:false});
document.addEventListener('touchend',   e=>{e.preventDefault(); tapEnd();                       },{passive:false});
document.addEventListener('mousedown',  e=>tapStart(e.clientX));
document.addEventListener('mousemove',  e=>tapMove(e.clientX));
document.addEventListener('mouseup',    ()=>tapEnd());

window.addEventListener('resize', ()=>{
  const nW=window.innerWidth, nH=window.innerHeight;
  camera.aspect=nW/nH; camera.updateProjectionMatrix();
  renderer.setSize(nW,nH);
});

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  tick++;

  // ── Ambient particles float ──
  ambientParticles.forEach(p => {
    p.position.y += p.userData.vy;
    p.position.x += Math.sin(tick*0.008 + p.userData.phase)*0.005;
    if (p.position.y > 12)  p.position.y = -12;
    if (p.position.y < -12) p.position.y =  12;
  });

  // ── Frame follow ──
  frameGroup.position.x += (frameTargetX - frameGroup.position.x) * 0.14;
  framePL.position.x = frameGroup.position.x;
  framePL.position.y = FRAME_Y + 1;
  framePL.intensity  = 4 + Math.sin(tick*0.06)*0.8;

  // Idle frame wobble
  frameGroup.rotation.z = Math.sin(tick*0.018)*0.012;

  // ── Camera shake ──
  if (camShakeAmt > 0.01) {
    camera.position.x = camBase.x + (Math.random()-0.5)*camShakeAmt;
    camera.position.y = camBase.y + (Math.random()-0.5)*camShakeAmt;
    camShakeAmt *= 0.72;
  } else {
    camera.position.x = camBase.x;
    camera.position.y = camBase.y;
  }

  if (gs !== ST.PLAY) { renderer.render(scene, camera); return; }

  // ── Spawn ──
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnCube();
    // Double spawn at high levels
    if (level >= 5 && Math.random() < 0.28) {
      setTimeout(()=>{ if(gs===ST.PLAY) spawnCube(); }, 450);
    }
    // Triple at very high levels
    if (level >= 9 && Math.random() < 0.2) {
      setTimeout(()=>{ if(gs===ST.PLAY) spawnCube(); }, 850);
    }
  }

  // ── Proximity glow on frame ──
  let closest = Infinity;
  cubes.forEach(c => {
    const dy = Math.abs(c.mesh.position.y - FRAME_Y);
    if (dy < closest) closest = dy;
  });
  const proximity = Math.max(0, 1 - closest/7);
  setFrameGlow(
    proximity > 0.6 ? 0xffd700 : 0x009ab5,
    1.4 + proximity * 2.5
  );

  // ── Update cubes ──
  cubes = cubes.filter(cube => {
    if (!cube.alive) return false;
    cube.update();

    if (cube.crossedFrame()) {
      cube.checked = true;
      if (cube.inFrame()) { onCatch(cube); return false; }
      else                { onMiss(cube);  return false; }
    }

    if (cube.mesh.position.y < DESPAWN_Y) {
      // Fell off without trigger (shouldn't happen, safety net)
      if (!cube.checked) onMiss(cube);
      else cube.destroy();
      return false;
    }
    return cube.alive;
  });

  // ── Effects ──
  shatters = shatters.filter(s => { s.update(); return !s.done; });
  ripples  = ripples.filter(r  => { r.update();  return !r.done; });

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
