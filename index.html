<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlyType — Physics Keyboard Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #080c14;
    --surface: #0d1321;
    --surface2: #121a2e;
    --border: #1e2d4a;
    --neon: #00f0ff;
    --neon2: #ff3cac;
    --neon3: #ffd700;
    --neon4: #39ff14;
    --text: #c8deff;
    --dim: #3a5070;
    --key-bg: #0f1a2e;
    --key-border: #1e3a5a;
    --key-glow: rgba(0, 240, 255, 0.15);
    --key-press: #00f0ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(transparent, rgba(0,240,255,0.04));
    pointer-events: none;
    z-index: 0;
  }

  .game-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
    padding: 20px 16px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* Header */
  header {
    text-align: center;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    background: linear-gradient(90deg, var(--neon), var(--neon2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,240,255,0.5));
  }

  header p {
    font-size: 0.72rem;
    color: var(--dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Stats row */
  .stats {
    display: flex;
    gap: 20px;
    width: 100%;
    justify-content: center;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 20px;
    text-align: center;
    min-width: 90px;
    position: relative;
    overflow: hidden;
  }

  .stat-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon), var(--neon2));
    opacity: 0.7;
  }

  .stat-label {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--neon);
    line-height: 1.2;
  }

  /* Word display area */
  .word-display-wrap {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px 12px;
    position: relative;
    overflow: hidden;
  }

  .word-display-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon2), transparent);
    opacity: 0.6;
  }

  .target-label {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .target-word {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.25em;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .target-char {
    transition: color 0.2s, text-shadow 0.2s;
  }

  .target-char.pending { color: var(--dim); }
  .target-char.correct {
    color: var(--neon4);
    text-shadow: 0 0 12px var(--neon4);
  }
  .target-char.wrong {
    color: var(--neon2);
    text-shadow: 0 0 12px var(--neon2);
  }
  .target-char.current {
    color: var(--neon);
    text-shadow: 0 0 16px var(--neon);
    animation: blink-cur 0.8s step-end infinite;
  }

  @keyframes blink-cur {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Typed text display */
  .typed-display {
    min-height: 44px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.2em;
    color: var(--neon);
    display: flex;
    align-items: center;
    gap: 2px;
    min-width: 200px;
    flex-wrap: wrap;
    position: relative;
  }

  .typed-display .cursor {
    display: inline-block;
    width: 3px;
    height: 1.2em;
    background: var(--neon);
    animation: blink 1s step-end infinite;
    border-radius: 2px;
    box-shadow: 0 0 8px var(--neon);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Landed letters in typed display */
  .landed-letter {
    display: inline-block;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 0.1em;
    color: var(--neon);
    animation: land-bounce 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  }

  .landed-letter.wrong-letter {
    color: var(--neon2);
    text-shadow: 0 0 10px var(--neon2);
  }

  @keyframes land-bounce {
    0% { transform: scale(1.8); opacity: 0.5; }
    50% { transform: scale(0.85); }
    75% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Flying letter canvas */
  #fly-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  /* Success/fail flash */
  .flash-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .flash-overlay.success { background: rgba(57, 255, 20, 0.08); }
  .flash-overlay.fail    { background: rgba(255, 60, 172, 0.1); }
  .flash-overlay.active  { opacity: 1; }

  /* Keyboard area */
  .keyboard-container {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px 18px;
    position: relative;
    overflow: hidden;
  }

  .keyboard-container::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    opacity: 0.5;
  }

  .kb-label {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 12px;
    text-align: center;
  }

  .kb-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 6px;
  }

  .key {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--key-bg);
    border: 1px solid var(--key-border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: all 0.08s ease;
    position: relative;
    overflow: hidden;
    width: 52px;
    height: 50px;
    box-shadow: 0 4px 0 #060b14, inset 0 1px 0 rgba(255,255,255,0.05);
    letter-spacing: 0.05em;
  }

  .key::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, var(--key-glow), transparent 70%);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .key:hover {
    border-color: var(--neon);
    color: var(--neon);
    box-shadow: 0 4px 0 #060b14, 0 0 12px rgba(0,240,255,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .key:hover::before { opacity: 1; }

  .key:active, .key.pressed {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #060b14, 0 0 20px rgba(0,240,255,0.4);
    border-color: var(--neon);
    color: var(--neon);
    background: rgba(0, 240, 255, 0.08);
  }

  .key.space-key {
    width: 260px;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--dim);
  }

  .key.backspace-key {
    width: 72px;
    font-size: 0.7rem;
    color: var(--dim);
  }

  .key.wide-key { width: 74px; }

  /* Particle effects */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 998;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    color: var(--neon3);
    font-weight: 700;
  }

  /* Word complete celebration */
  .word-complete-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    font-weight: 900;
    pointer-events: none;
    z-index: 1001;
    text-align: center;
    opacity: 0;
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
  }

  .word-complete-banner.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  /* Message / info */
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    flex-wrap: wrap;
    gap: 8px;
  }

  .hint-text {
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  .hint-text span {
    color: var(--neon);
  }

  .next-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--neon);
    border-radius: 6px;
    color: var(--neon);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    display: none;
  }

  .next-btn:hover {
    background: rgba(0,240,255,0.1);
    box-shadow: 0 0 16px rgba(0,240,255,0.3);
  }

  .next-btn.visible { display: block; }

  /* Streak indicator */
  .streak-flash {
    position: fixed;
    top: 20px;
    right: 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    color: var(--neon3);
    text-shadow: 0 0 20px var(--neon3);
    pointer-events: none;
    z-index: 1002;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
  }

  .streak-flash.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Category badge */
  .category-badge {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--neon2);
    border: 1px solid rgba(255,60,172,0.3);
    border-radius: 20px;
    padding: 2px 10px;
    display: inline-block;
  }
</style>
</head>
<body>

<canvas id="fly-canvas"></canvas>
<div class="flash-overlay" id="flash"></div>
<div class="word-complete-banner" id="complete-banner"></div>
<div class="streak-flash" id="streak-flash"></div>

<div class="game-wrap">
  <header>
    <h1>FLYTYPE</h1>
    <p>physics keyboard challenge</p>
  </header>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score-val">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="streak-val">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Words</div>
      <div class="stat-value" id="words-val">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Level</div>
      <div class="stat-value" id="level-val">1</div>
    </div>
  </div>

  <div class="word-display-wrap">
    <div class="target-label">▸ Type this word <span class="category-badge" id="cat-badge">animals</span></div>
    <div class="target-word" id="target-word"></div>
    <div style="display:flex; align-items:center; gap:12px; margin-top:6px;">
      <div style="font-size:0.62rem; color:var(--dim); letter-spacing:0.2em; text-transform:uppercase;">Typed:</div>
      <div class="typed-display" id="typed-display"><span class="cursor"></span></div>
    </div>
  </div>

  <div class="info-row">
    <div class="hint-text">Click keys below — watch them <span>fly</span> into place!</div>
    <button class="next-btn" id="next-btn" onclick="nextWord()">Next Word →</button>
  </div>

  <div class="keyboard-container">
    <div class="kb-label">◈ flytype keyboard ◈</div>
    <div id="keyboard"></div>
  </div>
</div>

<script>
// ─── Word lists by category ────────────────────────────────────────────
const wordLists = {
  animals:  ['cat','dog','fox','owl','bear','wolf','frog','lion','fish','duck','crab','deer','hawk','mole','crow','puma','zebra','shark','eagle','tiger','snake','horse','llama','rhino','koala','moose','bison','hyena','gecko','lemur'],
  space:    ['sun','moon','star','mars','nova','void','comet','orbit','pluto','venus','nebula','quasar','saturn','cosmos','galaxy','meteor','pulsar','aurora','photon','zenith','eclipse','Jupiter','Uranus','Neptune'],
  food:     ['pie','egg','ham','bun','cake','chip','corn','lime','milk','rice','soup','taco','beet','kiwi','olive','sushi','salad','pizza','grape','lemon','mango','bacon','bagel','cream','pasta','peach','melon','toast','waffle','cherry'],
  tech:     ['bit','cpu','gpu','ram','lan','wifi','data','byte','code','node','loop','grid','hash','icon','ping','port','root','sync','chat','blog','cloud','debug','query','stack','pixel','cache','array','token','regex','frame'],
  nature:   ['oak','sea','ice','dew','fog','mud','ash','rock','sand','cave','leaf','rain','snow','wind','wave','lake','moss','pine','tide','gust','storm','cliff','grove','field','brook','coral','fern','bloom','thorn','birch'],
};

const categories = Object.keys(wordLists);
let currentCategory = 'animals';
let currentWord = '';
let typedSoFar = '';
let score = 0;
let streak = 0;
let wordsCompleted = 0;
let level = 1;
let wordDone = false;
let inFlight = false;
let flightQueue = [];

// ─── Canvas physics ────────────────────────────────────────────────────
const canvas = document.getElementById('fly-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function lerp(a, b, t) { return a + (b - a) * t; }

class FlyingLetter {
  constructor(letter, sx, sy, tx, ty, color, onLand) {
    this.letter = letter;
    this.x = sx; this.y = sy;
    this.tx = tx; this.ty = ty;
    this.color = color;
    this.onLand = onLand;
    this.done = false;
    this.t = 0;

    // Physics arc
    const dx = tx - sx, dy = ty - sy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    this.arcHeight = -(dist * (0.4 + Math.random() * 0.3));
    this.spin = (Math.random() - 0.5) * 720;
    this.angle = 0;
    this.speed = 0.028 + Math.random() * 0.018 + (level * 0.003);
    this.scale = 1;
    this.trail = [];
  }

  update() {
    this.t += this.speed;
    if (this.t >= 1) { this.t = 1; this.done = true; this.onLand(); }

    const ease = this.t < 0.5
      ? 4 * this.t * this.t * this.t
      : 1 - Math.pow(-2 * this.t + 2, 3) / 2;

    this.x = lerp(this.x, this.tx, this.speed * 1.5) * 0 + lerp(
      this.x === this.tx ? this.tx : this.x,
      this.tx,
      0
    );

    // Bezier: P = (1-t)²P0 + 2(1-t)tP1 + t²P2
    // P1 is midpoint raised up by arcHeight
    const mx = (parseFloat(this.constructor._sx || this.tx) + this.tx) / 2;
    const my = (parseFloat(this.constructor._sy || this.ty) + this.ty) / 2 + this.arcHeight;
    this.constructor._sx = this.constructor._sx;

    const t = this.t;
    const _sx = this._startX, _sy = this._startY;
    const _mx = (_sx + this.tx) / 2;
    const _my = (_sy + this.ty) / 2 + this.arcHeight;

    this.x = (1-t)*(1-t)*_sx + 2*(1-t)*t*_mx + t*t*this.tx;
    this.y = (1-t)*(1-t)*_sy + 2*(1-t)*t*_my + t*t*this.ty;
    this.angle = this.spin * t;
    this.scale = 1.4 - 0.4 * Math.min(t * 2, 1) + (this.done ? 0 : 0);

    this.trail.push({x: this.x, y: this.y, a: 1 - t});
    if (this.trail.length > 8) this.trail.shift();
  }

  draw() {
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const p = this.trail[i];
      const alpha = (i / this.trail.length) * p.a * 0.4;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.color;
      ctx.font = `bold ${10 + i}px 'Share Tech Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(this.letter, p.x, p.y);
      ctx.restore();
    }

    // Main letter
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle * Math.PI / 180);
    ctx.scale(this.scale, this.scale);
    ctx.font = `bold 22px 'Orbitron', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 12;
    ctx.fillText(this.letter, 0, 0);
    ctx.restore();
  }
}

let flyingLetters = [];
let animRunning = false;

function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  flyingLetters = flyingLetters.filter(l => !l.done);
  for (const l of flyingLetters) { l.update(); l.draw(); }

  // Spark particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.04;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  if (flyingLetters.length > 0 || particles.length > 0) {
    requestAnimationFrame(animLoop);
  } else {
    animRunning = false;
  }
}

function startAnim() {
  if (!animRunning) {
    animRunning = true;
    requestAnimationFrame(animLoop);
  }
}

function spawnSparks(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      color,
      r: 2 + Math.random() * 2,
      life: 1
    });
  }
}

// ─── Keyboard layout ──────────────────────────────────────────────────
const rows = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Z','X','C','V','B','N','M','⌫'],
  ['SPACE']
];

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  rows.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = k;
      btn.dataset.key = k;
      if (k === 'SPACE') btn.classList.add('space-key');
      else if (k === '⌫') btn.classList.add('backspace-key');
      else if (['Q','P','A','L'].includes(k)) btn.classList.add('wide-key');
      btn.addEventListener('click', () => handleKey(k));
      rowDiv.appendChild(btn);
    });
    kb.appendChild(rowDiv);
  });
}

// ─── Game logic ───────────────────────────────────────────────────────
function pickWord() {
  const idx = Math.floor(Math.random() * categories.length);
  currentCategory = categories[idx];
  const words = wordLists[currentCategory];
  const word = words[Math.floor(Math.random() * words.length)];
  return word.toUpperCase();
}

function setTargetWord(word) {
  currentWord = word;
  typedSoFar = '';
  wordDone = false;
  flightQueue = [];
  flyingLetters = [];
  document.getElementById('next-btn').classList.remove('visible');
  document.getElementById('cat-badge').textContent = currentCategory;

  const container = document.getElementById('target-word');
  container.innerHTML = '';
  for (let i = 0; i < word.length; i++) {
    const span = document.createElement('span');
    span.className = 'target-char pending';
    span.textContent = word[i] === ' ' ? '·' : word[i];
    span.id = `tc-${i}`;
    container.appendChild(span);
  }
  if (currentWord.length > 0) {
    document.getElementById('tc-0').className = 'target-char current';
  }

  renderTyped();
}

function renderTyped() {
  const disp = document.getElementById('typed-display');
  disp.innerHTML = '';
  for (let i = 0; i < typedSoFar.length; i++) {
    const span = document.createElement('span');
    span.className = 'landed-letter';
    if (typedSoFar[i] !== currentWord[i]) span.classList.add('wrong-letter');
    span.textContent = typedSoFar[i];
    disp.appendChild(span);
  }
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  disp.appendChild(cursor);
}

function updateTargetHighlights() {
  for (let i = 0; i < currentWord.length; i++) {
    const el = document.getElementById(`tc-${i}`);
    if (!el) continue;
    if (i < typedSoFar.length) {
      el.className = 'target-char ' + (typedSoFar[i] === currentWord[i] ? 'correct' : 'wrong');
    } else if (i === typedSoFar.length) {
      el.className = 'target-char current';
    } else {
      el.className = 'target-char pending';
    }
  }
}

function handleKey(k) {
  if (wordDone) return;

  // Visual press
  const btn = document.querySelector(`[data-key="${k}"]`);
  if (btn) {
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 100);
  }

  if (k === '⌫') {
    if (typedSoFar.length > 0) {
      typedSoFar = typedSoFar.slice(0, -1);
      renderTyped();
      updateTargetHighlights();
    }
    return;
  }

  const letter = k === 'SPACE' ? ' ' : k;
  if (typedSoFar.length >= currentWord.length) return;

  // Get key position for flight origin
  const keyRect = btn ? btn.getBoundingClientRect() : { left: window.innerWidth/2, top: window.innerHeight*0.8, width: 52, height: 50 };
  const sx = keyRect.left + keyRect.width / 2;
  const sy = keyRect.top + keyRect.height / 2;

  // Get landing position (inside typed display, at cursor position)
  const disp = document.getElementById('typed-display');
  const dispRect = disp.getBoundingClientRect();
  const charWidth = 22;
  const tx = dispRect.left + 14 + typedSoFar.length * charWidth + charWidth / 2;
  const ty = dispRect.top + dispRect.height / 2;

  const isCorrect = letter === currentWord[typedSoFar.length];
  const color = isCorrect ? '#00f0ff' : '#ff3cac';

  // Add to typed immediately (letter appears when it lands)
  const insertIdx = typedSoFar.length;
  typedSoFar += letter;

  // Create flying letter
  const fl = new FlyingLetter(
    letter === ' ' ? '·' : letter,
    sx, sy, tx, ty, color,
    () => {
      spawnSparks(tx, ty, color);
      renderTyped();
      updateTargetHighlights();
      checkWordComplete();
    }
  );
  fl._startX = sx;
  fl._startY = sy;
  flyingLetters.push(fl);
  startAnim();

  updateTargetHighlights();
}

function checkWordComplete() {
  if (typedSoFar.length < currentWord.length) return;
  if (wordDone) return;

  const allCorrect = typedSoFar.split('').every((c, i) => c === currentWord[i]);
  wordDone = true;

  setTimeout(() => {
    if (allCorrect) {
      // Success
      score += 10 * level + streak * 2;
      streak++;
      wordsCompleted++;
      if (wordsCompleted % 5 === 0) level = Math.min(level + 1, 9);

      document.getElementById('score-val').textContent = score;
      document.getElementById('streak-val').textContent = streak;
      document.getElementById('words-val').textContent = wordsCompleted;
      document.getElementById('level-val').textContent = level;

      showBanner('✦ PERFECT ✦', '#39ff14');
      flashScreen('success');
      if (streak > 1) showStreak(streak);

      setTimeout(() => nextWord(), 900);
    } else {
      // Wrong — show retry
      streak = 0;
      document.getElementById('streak-val').textContent = streak;
      showBanner('✕ TRY AGAIN', '#ff3cac');
      flashScreen('fail');
      document.getElementById('next-btn').classList.add('visible');
    }
  }, 200);
}

function showBanner(text, color) {
  const b = document.getElementById('complete-banner');
  b.textContent = text;
  b.style.color = color;
  b.style.textShadow = `0 0 30px ${color}`;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 800);
}

function flashScreen(type) {
  const el = document.getElementById('flash');
  el.className = `flash-overlay ${type} active`;
  setTimeout(() => el.classList.remove('active'), 250);
}

function showStreak(n) {
  const el = document.getElementById('streak-flash');
  el.textContent = `🔥 ${n}× STREAK`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

function nextWord() {
  setTargetWord(pickWord());
}

// Physical keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'Backspace') { e.preventDefault(); handleKey('⌫'); return; }
  if (e.key === ' ') { e.preventDefault(); handleKey('SPACE'); return; }
  const k = e.key.toUpperCase();
  if (/^[A-Z]$/.test(k)) handleKey(k);
});

// ─── Init ──────────────────────────────────────────────────────────────
buildKeyboard();
setTargetWord(pickWord());
</script>
</body>
</html>
